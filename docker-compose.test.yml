services:
  # 1. Firestore Emulator
  firestore-test:
    image: mtlynch/firestore-emulator
    environment:
      - FIRESTORE_PROJECT_ID=filadelfias-test
      - PORT=8080
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  # 2. Backend API (runs seed on startup)
  backend-test:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: >
      sh -c "poetry run python src/scripts/seed_e2e_data.py &&
             poetry run uvicorn src.main:app --host 0.0.0.0 --port 8000"
    environment:
      - FIRESTORE_EMULATOR_HOST=firestore-test:8080
      - PROJECT_ID=filadelfias-test
      - GOOGLE_CLOUD_PROJECT=filadelfias-test
      - GCLOUD_PROJECT=filadelfias-test
      - ENVIRONMENT=test
      - SECRET_KEY=test-secret-key-for-e2e
      - DEBUG=true
      - CORS_ORIGINS_STR=http://localhost:5173
      - PYTHONPATH=/app
    depends_on:
      firestore-test:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  # 3. Frontend Web App
  web-test:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.e2e
      args:
        # Use localhost:8000 because Playwright tests run on host, not inside Docker
        VITE_API_URL: http://localhost:8000
    depends_on:
      backend-test:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s
