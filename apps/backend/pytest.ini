[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require Firestore emulator)
    slow: Slow running tests
    firestore: Tests that require Firestore/Firebase credentials

# Coverage - removed from default to speed up quick test runs
# Use: pytest --cov=src --cov-report=html for coverage
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -v
