# Bible public navigation flow
# Covers the public Bible area and search screen using the current Maestro stack.

appId: com.filadelfias.app
tags:
  - regression
  - navigation
  - bible

---

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      text: "Bíblia"
    timeout: 10000

- tapOn:
    text: "Bíblia"

- extendedWaitUntil:
    visible:
      text: "Bíblia Sagrada"
    timeout: 10000

- assertVisible:
    text: "Antigo Testamento"

- tapOn:
    text: "Buscar"

- extendedWaitUntil:
    visible:
      text: "Buscar na Bíblia"
    timeout: 5000

- assertVisible:
    text: "Digite uma palavra ou frase"

- tapOn:
    text: "Digite uma palavra ou frase"

- inputText: "amor"

- takeScreenshot: bible_search
