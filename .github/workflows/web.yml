name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/backend/**'
      - 'docker-compose.test.yml'
      - 'run_e2e_local.sh'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/backend/**'
      - 'docker-compose.test.yml'
      - 'run_e2e_local.sh'
      - '.github/workflows/web.yml'
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full E2E suite'
        required: false
        default: false
        type: boolean

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: apps/web/coverage/coverage-final.json
          flags: web
          fail_ci_if_error: false

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run public smoke
        run: npm run test:e2e:smoke:public

      - name: Run authenticated smoke
        run: npm run test:e2e:smoke:auth:local

      - name: Run critical journeys
        run: npm run test:e2e:critical:local

      - name: Run full E2E suite
        if: github.event_name == 'workflow_dispatch' && inputs.full_suite == true
        run: npm run test:e2e:local

      - name: Dump Docker logs on failure
        if: failure()
        working-directory: .
        run: docker compose -f docker-compose.test.yml logs --tail=200 backend-test postgres-test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7
