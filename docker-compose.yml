services:
  firebase:
    image: andreysenov/firebase-tools:latest
    container_name: filadelfias_firebase
    working_dir: /app
    command: firebase emulators:start --only firestore,auth --project filadelfias-dev
    ports:
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
      - "4000:4000"   # Emulator UI
    volumes:
      - ./firebase.json:/app/firebase.json
      - firebase_data:/app/.firebase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: filadelfias_api
    entrypoint: []
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/src:/app/src
    environment:
      FIRESTORE_EMULATOR_HOST: firebase:8080
      FIREBASE_AUTH_EMULATOR_HOST: firebase:9099
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      CORS_ORIGINS_STR: http://localhost:5173,http://localhost:3000
    depends_on:
      firebase:
        condition: service_healthy

  web:
    image: node:22-alpine
    container_name: filadelfias_web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  firebase_data:
  web_node_modules:
