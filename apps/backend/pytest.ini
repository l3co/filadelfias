[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    firestore: Tests that require Firestore/Firebase credentials

# Coverage
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -v
