services:
  postgres:
    image: postgres:16-alpine
    container_name: filadelfias_postgres
    environment:
      POSTGRES_DB: filadelfias
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filadelfias"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: filadelfias_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/src:/app/src
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/filadelfias
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      CORS_ORIGINS_STR: http://localhost:5174,http://127.0.0.1:5174,http://localhost:5173,http://localhost:3000,http://tauri.localhost,https://tauri.localhost,tauri://localhost
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  seed:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: filadelfias_seed
    command: python -m src.scripts.seed_dev_data
    volumes:
      - ./apps/backend/src:/app/src
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/filadelfias
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  web:
    image: node:22-alpine
    container_name: filadelfias_web
    working_dir: /app
    command: sh -c "{ cp /app/.env /tmp/.env.clean && mv /tmp/.env.clean /app/.env; } 2>/dev/null; npm install && npm run dev -- --host"
    ports:
      - "5174:5174"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  web_node_modules:
