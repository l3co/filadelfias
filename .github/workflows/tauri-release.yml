name: Tauri Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ID=$(gh release create ${{ github.ref_name }} \
            --title "Filadelfias ${{ github.ref_name }}" \
            --notes "Veja as notas de versao." \
            --latest)
          echo "id=$ID" >> $GITHUB_OUTPUT

  build-linux:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/tauri/src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/tauri

      - name: Build Linux
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Filadelfias ${{ github.ref_name }}"
          releaseBody: "Veja as notas de versao."
          releaseDraft: false
          prerelease: false
          projectPath: apps/tauri
          args: --bundles deb,rpm,appimage

  build-windows:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/tauri/src-tauri -> target"

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/tauri

      - name: Build Windows
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Filadelfias ${{ github.ref_name }}"
          releaseBody: "Veja as notas de versao."
          releaseDraft: false
          prerelease: false
          projectPath: apps/tauri
          args: --bundles msi,nsis

  build-macos-arm:
    needs: create-release
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/tauri/src-tauri -> target"

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/tauri

      - name: Build macOS (Apple Silicon)
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Filadelfias ${{ github.ref_name }}"
          releaseBody: "Veja as notas de versao."
          releaseDraft: false
          prerelease: false
          projectPath: apps/tauri
          args: --target aarch64-apple-darwin

  build-macos-x86:
    needs: create-release
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/tauri/src-tauri -> target"

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/tauri

      - name: Build macOS (Intel)
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Filadelfias ${{ github.ref_name }}"
          releaseBody: "Veja as notas de versao."
          releaseDraft: false
          prerelease: false
          projectPath: apps/tauri
          args: --target x86_64-apple-darwin

  build-android:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/tauri/src-tauri -> target"

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked --version "^2"

      - name: Restore Android keystore
        run: |
          mkdir -p apps/tauri/src-tauri/gen/android/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/tauri/src-tauri/gen/android/keystore/release.jks

      - name: Build Android AAB
        working-directory: apps/tauri
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          NDK_HOME: /usr/local/lib/android/sdk/ndk/29.0.14206865
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/tauri/src-tauri/gen/android/keystore/release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npx tauri android build --aab --target aarch64 --ci

      - name: Find Android AAB
        id: find_aab
        run: |
          AAB=$(find apps/tauri/src-tauri/gen/android/app/build/outputs/bundle \
            -name "*.aab" | head -1)
          echo "path=$AAB" >> $GITHUB_OUTPUT
          echo "Found AAB: $AAB"

      - name: Upload Android AAB to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            "${{ steps.find_aab.outputs.path }}" \
            --clobber
