name: Tauri Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds desabilitados - aguardando ativação da conta Apple Developer
          # - platform: macos-latest
          #   args: "--target aarch64-apple-darwin"
          #   rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # - platform: macos-latest
          #   args: "--target x86_64-apple-darwin"
          #   rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: "--bundles deb,rpm,appimage"
            rust_targets: ""
          - platform: windows-latest
            args: "--bundles msi,nsis"
            rust_targets: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/tauri/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            rpm

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/tauri

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Filadelfias ${{ github.ref_name }}"
          releaseBody: "Veja as notas de versao."
          releaseDraft: false
          prerelease: false
          projectPath: apps/tauri
          args: ${{ matrix.args }}

  release-android:
    needs: release-desktop
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/tauri/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/tauri/src-tauri -> target"

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked --version "^2"

      - name: Restore Android keystore
        run: |
          mkdir -p apps/tauri/src-tauri/gen/android/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/tauri/src-tauri/gen/android/keystore/release.jks

      - name: Build signed Android AAB
        working-directory: apps/tauri
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          NDK_HOME: /usr/local/lib/android/sdk/ndk/29.0.14206865
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/tauri/src-tauri/gen/android/keystore/release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npx tauri android build --aab --target aarch64 --ci

      - name: Find Android AAB
        id: find_aab
        run: |
          AAB=$(find apps/tauri/src-tauri/gen/android/app/build/outputs/bundle \
            -name "*.aab" | head -1)
          echo "path=$AAB" >> $GITHUB_OUTPUT
          echo "Found AAB: $AAB"

      - name: Upload Android AAB to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            "${{ steps.find_aab.outputs.path }}" \
            --clobber
