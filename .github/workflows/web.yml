name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full E2E suite'
        required: false
        default: false
        type: boolean

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: apps/web/coverage/coverage-final.json
          flags: web
          fail_ci_if_error: false

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/web

    services:
      firestore:
        image: mtlynch/firestore-emulator
        env:
          FIRESTORE_PROJECT_ID: filadelfias-ci
          PORT: 8080
        ports:
          - 8080:8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install backend dependencies
        working-directory: apps/backend
        run: poetry install --no-interaction --no-root

      - name: Run seed data
        working-directory: apps/backend
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          PROJECT_ID: filadelfias-ci
          ENVIRONMENT: test
          PYTHONPATH: ${{ github.workspace }}/apps/backend
        run: poetry run python src/scripts/seed_e2e_data.py

      - name: Start backend server
        working-directory: apps/backend
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          PROJECT_ID: filadelfias-ci
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-e2e
          DEBUG: "false"
          CORS_ORIGINS_STR: http://localhost:5173
        run: |
          poetry run uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Start frontend server
        run: |
          npm run preview -- --port 5173 &
          sleep 5
          curl -f http://localhost:5173 || exit 1

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run E2E tests
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          if [ "${{ github.event.inputs.full_suite }}" == "true" ]; then
            echo "Running FULL E2E Suite..."
            npx playwright test
          else
            echo "Running Smoke Tests (@smoke)..."
            npx playwright test --grep @smoke
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Cucumber report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: apps/web/reports/
          retention-days: 7

  deploy:
    name: Deploy to Firebase Hosting
    needs: e2e
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: filadelfias-6a116
          entryPoint: apps/web
