services:
  db:
    image: postgres:15-alpine
    container_name: filadelfias_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: filadelfias
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: filadelfias_api
    # Override entrypoint for development with hot reload
    entrypoint: []
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/alembic:/app/alembic
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/filadelfias
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      CORS_ORIGINS_STR: http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  web:
    image: node:22-alpine
    container_name: filadelfias_web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  web_node_modules:
