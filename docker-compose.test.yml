services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=filadelfias
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filadelfias"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  # 1. Backend API (runs seed on startup)
  backend-test:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             poetry run python src/scripts/seed_e2e_data.py &&
             poetry run uvicorn src.main:app --host 0.0.0.0 --port 8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres-test:5432/filadelfias
      - ENVIRONMENT=test
      - SECRET_KEY=test-secret-key-for-e2e
      - DEBUG=true
      - CORS_ORIGINS_STR=http://localhost:5173,http://localhost:4173,http://127.0.0.1:4173
      - FRONTEND_URL=http://127.0.0.1:4173
      - PYTHONPATH=/app
    depends_on:
      postgres-test:
        condition: service_healthy
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 3s

  # 2. Frontend Web App
  # Optional for containerized E2E only. Local Playwright runs use Vite from playwright.config.ts.
  web-test:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.e2e
      args:
        # Use localhost:8000 because Playwright tests run on host, not inside Docker
        VITE_API_URL: http://localhost:8000
    depends_on:
      backend-test:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s
