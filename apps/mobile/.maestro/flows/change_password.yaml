# Change Password Flow
# Tests the first-time password change flow

appId: com.filadelfias.app
tags:
  - regression
  - auth
  - security

env:
  NEW_USER_EMAIL: newuser@test.com
  TEMP_PASSWORD: TempPass123!
  NEW_PASSWORD: NewSecure123!@#

---

# Launch and login with temporary password
- launchApp:
    clearState: true

- assertVisible:
    text: "Entrar"

- tapOn:
    text: "Email"
- inputText: ${NEW_USER_EMAIL}

- tapOn:
    text: "Senha"
- inputText: ${TEMP_PASSWORD}

- tapOn:
    text: "Entrar"

# Should redirect to change password screen
- extendedWaitUntil:
    visible:
      text: "Criar nova senha"
    timeout: 10000

# Verify warning message
- assertVisible:
    text: "Primeiro acesso"

# Enter current (temporary) password
- tapOn:
    text: "Senha temporária"
- inputText: ${TEMP_PASSWORD}

# Enter new password
- tapOn:
    text: "Nova senha"
- inputText: ${NEW_PASSWORD}

# Confirm new password
- tapOn:
    text: "Confirmar nova senha"
- inputText: ${NEW_PASSWORD}

# Submit
- tapOn:
    text: "Salvar nova senha"

# Wait for success and redirect
- extendedWaitUntil:
    visible:
      text: "Dashboard"
    timeout: 10000

- takeScreenshot: change_password_success
