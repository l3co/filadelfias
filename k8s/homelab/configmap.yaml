apiVersion: v1
kind: ConfigMap
metadata:
  name: filadelfias-config
  namespace: filadelfias
data:
  ENVIRONMENT: "production"
  DEBUG: "false"
  PORT: "8000"
  POSTGRES_DB: "filadelfias"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "filadelfias"
  API_URL: "https://api.filadelfias.com"
  FRONTEND_URL: "https://filadelfias.com"
  CORS_ORIGINS_STR: "https://filadelfias.com,https://www.filadelfias.com,tauri://localhost,https://tauri.localhost,http://tauri.localhost,http://localhost"
