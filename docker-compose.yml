services:
  firebase:
    image: mtlynch/firestore-emulator
    container_name: filadelfias_firebase
    ports:
      - "8080:8080"   # Firestore
    environment:
      - FIRESTORE_PROJECT_ID=filadelfias-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: filadelfias_api
    entrypoint: []
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/src:/app/src
    environment:
      FIRESTORE_EMULATOR_HOST: firebase:8080
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      CORS_ORIGINS_STR: http://localhost:5173,http://localhost:3000
    depends_on:
      firebase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  seed:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: filadelfias_seed
    command: python -m src.scripts.seed_dev_data
    volumes:
      - ./apps/backend/src:/app/src
    environment:
      FIRESTORE_EMULATOR_HOST: firebase:8080
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  web:
    image: node:22-alpine
    container_name: filadelfias_web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  firebase_data:
  web_node_modules:
