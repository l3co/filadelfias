# Login Validation Flow
# Tests form validation on login screen

appId: com.filadelfias.app
tags:
  - regression
  - auth
  - validation

---

# Launch the app
- launchApp:
    clearState: true

# Wait for login screen
- assertVisible:
    text: "Entrar"

# Test 1: Empty form submission
- tapOn:
    text: "Entrar"

# Should show validation errors
- assertVisible:
    text: "Email inválido"
    optional: true

# Test 2: Invalid email format
- tapOn:
    text: "Email"
- inputText: "invalid-email"
- tapOn:
    text: "Senha"
- inputText: "password123"
- tapOn:
    text: "Entrar"

# Should show email validation error
- assertVisible:
    text: "Email inválido"

# Test 3: Clear and enter valid email but empty password
- clearState
- launchApp:
    clearState: true

- assertVisible:
    text: "Entrar"

- tapOn:
    text: "Email"
- inputText: "valid@email.com"
- tapOn:
    text: "Entrar"

# Should show password required error
- assertVisible:
    text: "Senha é obrigatória"
    optional: true

- takeScreenshot: login_validation_errors
