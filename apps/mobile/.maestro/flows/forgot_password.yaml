# Forgot Password Flow
# Tests the password recovery flow

appId: com.filadelfias.app
tags:
  - regression
  - auth

---

# Launch the app
- launchApp:
    clearState: true

# Wait for login screen
- assertVisible:
    text: "Entrar"

# Tap forgot password link
- tapOn:
    text: "Esqueceu sua senha?"

# Wait for forgot password screen
- assertVisible:
    text: "Esqueceu sua senha?"

# Enter email
- tapOn:
    text: "Email"
- inputText: "user@example.com"

# Submit
- tapOn:
    text: "Enviar instruções"

# Wait for success message
- extendedWaitUntil:
    visible:
      text: "Email enviado!"
    timeout: 10000

# Verify success screen
- assertVisible:
    text: "Email enviado!"

# Go back to login
- tapOn:
    text: "Voltar para Login"

# Verify we're back on login
- assertVisible:
    text: "Entrar"

- takeScreenshot: forgot_password_success
