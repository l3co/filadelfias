apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrate
  namespace: filadelfias
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: migration
          image: ghcr.io/l3co/filadelfias-backend:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              python - <<'PY'
              import asyncio
              import os
              from sqlalchemy import text
              from sqlalchemy.ext.asyncio import create_async_engine

              async def main():
                  database_url = os.environ["DATABASE_URL"]
                  engine = create_async_engine(database_url, pool_pre_ping=True)
                  try:
                      for attempt in range(60):
                          try:
                              async with engine.connect() as conn:
                                  await conn.execute(text("SELECT 1"))
                              print("postgres ready")
                              return
                          except Exception as exc:
                              print(f"waiting for postgres ({attempt + 1}/60): {exc}")
                              await asyncio.sleep(2)
                      raise SystemExit("postgres did not become ready in time")
                  finally:
                      await engine.dispose()

              asyncio.run(main())
              PY
              alembic upgrade head
          envFrom:
            - configMapRef:
                name: filadelfias-config
            - secretRef:
                name: filadelfias-secret
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: DATABASE_URL
              value: postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/filadelfias
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
